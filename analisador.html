<!DOCTYPE html>
<html>
<head>
    <title>Analisador de Excel</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
    <h1>Analisador de Estrutura Excel</h1>
    <input type="file" id="excelFile" accept=".xlsx,.xls">
    <pre id="output"></pre>

    <script>
        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });

                let output = '='.repeat(60) + '\n';
                output += 'ANÁLISE DO ARQUIVO EXCEL\n';
                output += '='.repeat(60) + '\n\n';

                output += `📊 Abas encontradas: ${workbook.SheetNames.join(', ')}\n\n`;

                workbook.SheetNames.forEach(sheetName => {
                    output += '='.repeat(60) + '\n';
                    output += `ABA: ${sheetName}\n`;
                    output += '='.repeat(60) + '\n\n';

                    const worksheet = workbook.Sheets[sheetName];
                    const data = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

                    output += `Total de registros: ${data.length}\n`;
                    output += `Colunas encontradas: ${Object.keys(data[0] || {}).join(' | ')}\n\n`;

                    output += 'PRIMEIROS 3 REGISTROS:\n';
                    output += JSON.stringify(data.slice(0, 3), null, 2);
                    output += '\n\n';
                });

                document.getElementById('output').textContent = output;
                console.log(output);
            };

            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
